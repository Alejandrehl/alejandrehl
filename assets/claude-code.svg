<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300" role="img" aria-label="Alejandro prompting in Claude Code — building production software with agentic AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12100e"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D97757"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="8" y="8" width="864" height="284" rx="16" fill="url(#bg)" stroke="#26211d" stroke-width="1.5"/>
  <rect x="8" y="8" width="864" height="3" rx="1.5" fill="url(#glow)"/>

  <!-- title bar -->
  <circle cx="40" cy="42" r="6.5" fill="#ff5f56"/>
  <circle cx="62" cy="42" r="6.5" fill="#ffbd2e"/>
  <circle cx="84" cy="42" r="6.5" fill="#27c93f"/>
  <text x="440" y="47" text-anchor="middle" font-family="'SFMono-Regular',Consolas,Menlo,monospace" font-size="14" fill="#6e6259">✳ claude code — ~/ale-hernandez-spa</text>
  <line x1="24" y1="66" x2="856" y2="66" stroke="#1e1a17" stroke-width="1"/>

  <!-- body -->
  <g font-family="'SFMono-Regular','JetBrains Mono',Consolas,Menlo,monospace" font-size="18.5">
    <text x="36" y="112" fill="#e8e2da" opacity="0"><tspan fill="#D97757" font-weight="700">› </tspan>ship a nutrition platform. production-grade, no shortcuts.<animate attributeName="opacity" begin="0.4s" dur="0.5s" from="0" to="1" fill="freeze"/></text>

    <text x="36" y="150" fill="#9b8d80" opacity="0"><tspan fill="#D97757" font-weight="700">✻ </tspan>Claude Code · orchestrating the build…<animate attributeName="opacity" begin="1.7s" dur="0.5s" from="0" to="1" fill="freeze"/></text>

    <text x="58" y="184" fill="#7d7269" font-size="16.5" opacity="0">NestJS · Postgres · React PWA · adaptive AI targets<animate attributeName="opacity" begin="2.7s" dur="0.5s" from="0" to="1" fill="freeze"/></text>

    <text x="36" y="222" fill="#7ee787" opacity="0"><tspan font-weight="700">✓ </tspan>deployed to production<animate attributeName="opacity" begin="3.7s" dur="0.5s" from="0" to="1" fill="freeze"/></text>

    <text x="36" y="262" fill="#e8e2da" opacity="0"><tspan fill="#D97757" font-weight="700">› </tspan>next.<animate attributeName="opacity" begin="4.9s" dur="0.5s" from="0" to="1" fill="freeze"/></text>
    <rect x="92" y="248" width="11" height="20" fill="#D97757" opacity="0"><animate attributeName="opacity" begin="5.2s" dur="1.05s" values="1;1;0;0" keyTimes="0;0.5;0.5;1" repeatCount="indefinite"/></rect>
  </g>
</svg>
