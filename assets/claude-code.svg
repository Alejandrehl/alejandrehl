<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" width="880" height="320" role="img" aria-label="Alejandro prompting in Claude Code — shipping production software with agentic AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12100e"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D97757"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd9c7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffd9c7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffd9c7" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="type1"><rect x="28" y="92" width="0" height="32"><animate attributeName="width" begin="0.5s" dur="1.9s" from="0" to="660" fill="freeze" calcMode="linear"/></rect></clipPath>
  </defs>

  <!-- window -->
  <rect x="8" y="8" width="864" height="304" rx="16" fill="url(#bg)" stroke="#26211d" stroke-width="1.5"/>
  <rect x="8" y="8" width="864" height="3" rx="1.5" fill="url(#glow)"/>
  <rect x="8" y="8" width="150" height="3" fill="url(#sweep)"><animate attributeName="x" from="-150" to="880" dur="5s" begin="1.2s" repeatCount="indefinite"/></rect>

  <!-- title bar -->
  <circle cx="40" cy="42" r="6.5" fill="#ff5f56"/>
  <circle cx="62" cy="42" r="6.5" fill="#ffbd2e"/>
  <circle cx="84" cy="42" r="6.5" fill="#27c93f"/>
  <text x="440" y="47" text-anchor="middle" font-family="'SFMono-Regular',Consolas,Menlo,monospace" font-size="14" fill="#6e6259">✳ claude code — ~/ale-hernandez-spa</text>
  <line x1="24" y1="66" x2="856" y2="66" stroke="#1e1a17" stroke-width="1"/>

  <g font-family="'SFMono-Regular','JetBrains Mono',Consolas,Menlo,monospace" font-size="18.5">
    <!-- line 1: typewriter reveal -->
    <g clip-path="url(#type1)">
      <text x="36" y="114" fill="#e8e2da"><tspan fill="#D97757" font-weight="700">› </tspan>ship a nutrition platform. production-grade, no shortcuts.</text>
    </g>
    <rect x="690" y="99" width="10" height="21" fill="#D97757">
      <animate attributeName="x" begin="0.5s" dur="1.9s" from="52" to="690" fill="freeze" calcMode="linear"/>
      <animate attributeName="opacity" begin="2.4s" dur="0.3s" from="1" to="0" fill="freeze"/>
    </rect>

    <!-- line 2: working + animated dots -->
    <text x="36" y="150" fill="#9b8d80" opacity="0">
      <tspan fill="#D97757" font-weight="700">✻ </tspan>Claude Code · orchestrating<tspan>&#160;</tspan><tspan opacity="0">·<animate attributeName="opacity" begin="2.9s" dur="1.4s" values="0;1;1;0" keyTimes="0;0.2;0.8;1" repeatCount="indefinite"/></tspan><tspan opacity="0">·<animate attributeName="opacity" begin="3.15s" dur="1.4s" values="0;1;1;0" keyTimes="0;0.2;0.8;1" repeatCount="indefinite"/></tspan><tspan opacity="0">·<animate attributeName="opacity" begin="3.4s" dur="1.4s" values="0;1;1;0" keyTimes="0;0.2;0.8;1" repeatCount="indefinite"/></tspan>
      <animate attributeName="opacity" begin="2.4s" dur="0.45s" from="0" to="1" fill="freeze"/>
    </text>

    <!-- line 3: detail -->
    <text x="58" y="182" fill="#7d7269" font-size="16" opacity="0">NestJS · Postgres · React PWA · adaptive AI targets<animate attributeName="opacity" begin="3.3s" dur="0.45s" from="0" to="1" fill="freeze"/></text>

    <!-- line 4: deployed -->
    <text x="36" y="218" fill="#7ee787" opacity="0"><tspan font-weight="700">✓ </tspan>deployed to production<animate attributeName="opacity" begin="4.2s" dur="0.45s" from="0" to="1" fill="freeze"/></text>

    <!-- line 5: next prompt + blinking caret -->
    <text x="36" y="256" fill="#e8e2da" opacity="0"><tspan fill="#D97757" font-weight="700">› </tspan>ship it.<animate attributeName="opacity" begin="5.0s" dur="0.4s" from="0" to="1" fill="freeze"/></text>
    <rect x="150" y="242" width="10" height="19" fill="#D97757" opacity="0"><animate attributeName="opacity" begin="5.4s" dur="1.05s" values="1;1;0;0" keyTimes="0;0.5;0.5;1" repeatCount="indefinite"/></rect>
  </g>

  <!-- status bar -->
  <line x1="24" y1="280" x2="856" y2="280" stroke="#1a1613" stroke-width="1"/>
  <g font-family="'SFMono-Regular',Consolas,Menlo,monospace" font-size="12.5" opacity="0">
    <text x="36" y="299" fill="#5f554d">◇ agent-orchestration · main → production · zero tech debt</text>
    <text x="844" y="299" text-anchor="end" fill="#6e6259"><tspan fill="#D97757">✻</tspan> claude code</text>
    <animate attributeName="opacity" begin="5.4s" dur="0.6s" from="0" to="1" fill="freeze"/>
  </g>
</svg>
